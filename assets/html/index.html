<!DOCTYPE html>

<html lang="en">

<head>

	<link rel="stylesheet" href="../css/main.css">

	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

	<link rel="icon" type="image/svg+xml" href="../images/logo.svg">

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<script defer type="module" src="../js/main.js"></script>

	<title>Minetrack</title>

</head>

<body>

	<div id="tooltip"></div>

	<div id="status-overlay">
		<img class="logo-image" src="../images/logo.svg" alt="">
		<h1 class="logo-text">Minetrack</h1>
		<div id="status-text">Connecting...</div>
	</div>

	<div id="push">

		<div id="perc-bar"></div>

		<div class="dashboard">

			<header class="dashboard-header">
				<div class="header-brand">
					<img class="logo-image" src="../images/logo.svg" alt="">
					<div>
						<h1 class="logo-text">Minetrack</h1>
						<p class="logo-tagline">Live Minecraft server analytics</p>
					</div>
				</div>

				<div class="header-stats">
					<div class="stat-card">
						<span class="stat-value" id="stat_totalPlayers">0</span>
						<span class="stat-label">Players Online</span>
					</div>
					<div class="stat-card">
						<span class="stat-value" id="stat_networks">0</span>
						<span class="stat-label">Servers Tracked</span>
					</div>
				</div>

				<div class="header-actions">
					<button type="button" id="sort-by" class="header-btn">
						<span class="icon-sort-amount-desc"></span>
						<span class="header-btn-text">Sort by <strong id="sort-by-text">...</strong></span>
					</button>
					<button type="button" id="settings-toggle" class="header-btn header-btn-secondary">
						<span class="icon-gears"></span>
						<span class="header-btn-text">Graph Controls</span>
					</button>
				</div>
			</header>

			<section class="graph-section">
				<div class="section-header">
					<h2 class="section-title">Player History <span class="section-subtitle" id="graph-duration-label"></span></h2>
					<p class="section-hint">Drag to zoom · Double-click to reset</p>
				</div>
				<div class="graph-panel">
					<div id="big-graph-empty" class="graph-empty-state">
						<p>No history data yet</p>
						<p class="graph-empty-hint">Graph will populate as server pings are recorded</p>
					</div>
					<div id="big-graph"></div>
				</div>
				<div id="big-graph-controls">
					<div id="big-graph-controls-drawer">
						<div id="big-graph-checkboxes"></div>
						<div class="graph-controls-setall">
							<button type="button" minetrack-show-type="all" class="graph-controls-show"><span class="icon-eye"></span> Show All</button>
							<button type="button" minetrack-show-type="none" class="graph-controls-show"><span class="icon-eye-slash"></span> Hide All</button>
							<button type="button" minetrack-show-type="favorites" class="graph-controls-show"><span class="icon-star"></span> Only Favorites</button>
						</div>
					</div>
				</div>
			</section>

			<section class="servers-section">
				<h2 class="section-title">Servers</h2>
				<div id="server-list"></div>
			</section>

		</div>

	</div>

	<footer id="footer">
		<span class="icon-code"></span> Powered by open source software — <a href="https://github.com/Cryptkeeper/Minetrack">make it your own!</a>
	</footer>

</body>

</html>
